<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢屬性剋制查詢</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .selector-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .selector-box {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
        }
        .selector-box label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #555;
            font-size: 16px;
        }
        select {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
        }
        select:hover {
            border-color: #667eea;
        }
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        .result {
            margin-top: 30px;
        }
        .result h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .type-group {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        .type-group h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }
        .effectiveness {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .type-badge {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            min-width: 80px;
            transition: transform 0.2s;
        }
        .type-badge:hover {
            transform: scale(1.05);
        }
        .double {
            background: #ff6b6b;
            color: white;
            border: 2px solid #ee5a5a;
        }
        .half {
            background: #4ecdc4;
            color: white;
            border: 2px solid #3dbdb5;
        }
        .zero {
            background: #95a5a6;
            color: white;
            border: 2px solid #7f8c8d;
        }
        .normal {
            background: #dfe6e9;
            color: #2d3436;
            border: 2px solid #b2bec3;
        }
        .section-title {
            font-size: 16px;
            margin: 15px 0 10px 0;
            color: #666;
            text-align: center;
        }
        .dual-result {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .dual-result h3 {
            font-size: 20px;
            margin-bottom: 15px;
        }
        .dual-effectiveness {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .dual-badge {
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            min-width: 100px;
        }
        .quadruple {
            background: #c0392b;
            color: white;
        }
        .four-times {
            background: #e74c3c;
            color: white;
        }
        .two-times {
            background: #e67e22;
            color: white;
        }
        .one-times {
            background: #3498db;
            color: white;
        }
        .half-times {
            background: #1abc9c;
            color: white;
        }
        .quarter-times {
            background: #9b59b6;
            color: white;
        }
        .zero-times {
            background: #34495e;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 寶可夢屬性剋制查詢</h1>
        
        <div class="selector-group">
            <div class="selector-box">
                <label>第一屬性：</label>
                <select id="type1" onchange="calculateEffectiveness()">
                    <option value="">請選擇屬性</option>
                </select>
            </div>
            <div class="selector-box">
                <label>第二屬性（可選）：</label>
                <select id="type2" onchange="calculateEffectiveness()">
                    <option value="">無第二屬性</option>
                </select>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="resetSelections()" style="padding: 12px 30px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; transition: all 0.3s;">🔄 重置</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        // 寶可夢18個屬性
        const types = [
            '一般', '格鬥', '飛行', '毒', '地面', 
            '岩石', '蟲', '幽靈', '鋼', '火', 
            '水', '草', '電', '超能', '冰', 
            '龍', '惡', '妖精'
        ];

        // 屬性對應表（攻擊方 vs 防守方）
        // 數值：0=無效, 0.5=半, 1=正常, 2=倍
        const typeChart = {
            '一般':   [1, 1, 1, 1, 1, 0.5, 1, 0, 0.5, 1, 1, 1, 1, 1, 1, 1, 1, 1],
            '格鬥':   [2, 1, 0.5, 0.5, 1, 2, 0.5, 0, 2, 1, 1, 1, 1, 0.5, 2, 1, 2, 0.5],
            '飛行':   [1, 2, 1, 1, 1, 0.5, 2, 1, 0.5, 1, 1, 2, 0.5, 1, 1, 1, 1, 1],
            '毒':     [1, 1, 1, 0.5, 0.5, 0.5, 1, 0.5, 0, 1, 1, 2, 1, 1, 1, 1, 1, 2],
            '地面':   [1, 1, 0, 2, 1, 2, 0.5, 1, 2, 2, 1, 0.5, 2, 1, 1, 1, 1, 1],
            '岩石':   [1, 0.5, 2, 1, 0.5, 1, 2, 1, 0.5, 2, 1, 1, 1, 1, 2, 1, 1, 1],
            '蟲':     [1, 0.5, 0.5, 0.5, 1, 1, 1, 0.5, 0.5, 0.5, 1, 2, 1, 2, 1, 1, 2, 0.5],
            '幽靈':   [0, 1, 1, 1, 1, 1, 1, 2, 1, 1, 1, 1, 1, 2, 1, 1, 0.5, 1],
            '鋼':     [1, 1, 1, 1, 1, 2, 1, 1, 0.5, 0.5, 0.5, 1, 0.5, 1, 2, 1, 1, 2],
            '火':     [1, 1, 1, 1, 1, 0.5, 2, 1, 2, 0.5, 0.5, 2, 1, 1, 2, 0.5, 1, 1],
            '水':     [1, 1, 1, 1, 2, 2, 1, 1, 1, 2, 0.5, 0.5, 1, 1, 1, 0.5, 1, 1],
            '草':     [1, 1, 0.5, 0.5, 2, 2, 0.5, 1, 0.5, 0.5, 2, 0.5, 1, 1, 1, 0.5, 1, 1],
            '電':     [1, 1, 2, 1, 0, 1, 1, 1, 1, 1, 2, 0.5, 0.5, 1, 1, 0.5, 1, 1],
            '超能':   [1, 2, 1, 2, 1, 1, 1, 1, 0.5, 1, 1, 1, 1, 0.5, 1, 1, 0, 1],
            '冰':     [1, 1, 2, 1, 2, 1, 1, 1, 0.5, 0.5, 0.5, 2, 1, 1, 0.5, 2, 1, 1],
            '龍':     [1, 1, 1, 1, 1, 1, 1, 1, 0.5, 1, 1, 1, 1, 1, 1, 2, 1, 0],
            '惡':     [1, 0.5, 1, 1, 1, 1, 1, 2, 1, 1, 1, 1, 1, 2, 1, 1, 0.5, 0.5],
            '妖精':   [1, 2, 1, 0.5, 1, 1, 1, 1, 0.5, 0.5, 1, 1, 1, 1, 1, 2, 2, 1]
        };

        // 初始化選單
        function initSelects() {
            const select1 = document.getElementById('type1');
            const select2 = document.getElementById('type2');
            
            types.forEach(type => {
                const option1 = document.createElement('option');
                option1.value = type;
                option1.textContent = type;
                select1.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = type;
                option2.textContent = type;
                select2.appendChild(option2);
            });
        }

        // 計算單一屬性的攻擊效果
        function getEffectiveness(attackType, defenseTypes) {
            let multiplier = 1;
            defenseTypes.forEach(defType => {
                const defIndex = types.indexOf(defType);
                const atkIndex = types.indexOf(attackType);
                multiplier *= typeChart[attackType][defIndex];
            });
            return multiplier;
        }

        // 獲取效果等級
        function getEffectLabel(multiplier) {
            if (multiplier === 0) return '無效 (0x)';
            if (multiplier === 0.25) return '1/4倍';
            if (multiplier === 0.5) return '1/2倍';
            if (multiplier === 1) return '1倍';
            if (multiplier === 2) return '2倍';
            if (multiplier === 4) return '4倍';
            return multiplier + '倍';
        }

        // 獲取效果等級class
        function getEffectClass(multiplier) {
            if (multiplier === 0) return 'zero-times';
            if (multiplier === 0.25) return 'quarter-times';
            if (multiplier === 0.5) return 'half-times';
            if (multiplier === 1) return 'one-times';
            if (multiplier === 2) return 'two-times';
            if (multiplier === 4) return 'four-times';
            return 'quadruple';
        }

        // 計算並顯示結果
        function calculateEffectiveness() {
            const type1 = document.getElementById('type1').value;
            const type2 = document.getElementById('type2').value;
            const resultDiv = document.getElementById('result');

            if (!type1) {
                resultDiv.innerHTML = '';
                return;
            }

            const defenseTypes = type1 ? [type1] : [];
            if (type2) {
                defenseTypes.push(type2);
            }

            // 計算每個攻擊屬性的效果
            const effectiveness = {};
            types.forEach(attackType => {
                const multiplier = getEffectiveness(attackType, defenseTypes);
                if (!effectiveness[multiplier]) {
                    effectiveness[multiplier] = [];
                }
                effectiveness[multiplier].push(attackType);
            });

            // 構建結果HTML
            let html = `<h2>防守屬性: ${defenseTypes.join(' / ')}</h2>`;

            if (type2) {
                // 雙屬性顯示 - 與單屬性相同的分類方式
                // 4倍
                if (effectiveness[4]) {
                    html += `<div class="type-group">
                        <h3>🔥 4倍效果 (超級有效)</h3>
                        <div class="effectiveness">`;
                    effectiveness[4].forEach(type => {
                        html += `<span class="type-badge double">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 2倍
                if (effectiveness[2]) {
                    html += `<div class="type-group">
                        <h3>🔥 2倍效果 (超級有效)</h3>
                        <div class="effectiveness">`;
                    effectiveness[2].forEach(type => {
                        html += `<span class="type-badge double">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 1倍
                if (effectiveness[1]) {
                    html += `<div class="type-group">
                        <h3>💚 1倍效果 (正常)</h3>
                        <div class="effectiveness">`;
                    effectiveness[1].forEach(type => {
                        html += `<span class="type-badge normal">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 0.5倍
                if (effectiveness[0.5]) {
                    html += `<div class="type-group">
                        <h3>💙 0.5倍效果 (效果不佳)</h3>
                        <div class="effectiveness">`;
                    effectiveness[0.5].forEach(type => {
                        html += `<span class="type-badge half">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 0.25倍
                if (effectiveness[0.25]) {
                    html += `<div class="type-group">
                        <h3>💜 0.25倍效果 (效果很差)</h3>
                        <div class="effectiveness">`;
                    effectiveness[0.25].forEach(type => {
                        html += `<span class="type-badge half">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 0倍
                if (effectiveness[0]) {
                    html += `<div class="type-group">
                        <h3>⚫ 0倍效果 (無效)</h3>
                        <div class="effectiveness">`;
                    effectiveness[0].forEach(type => {
                        html += `<span class="type-badge zero">${type}</span>`;
                    });
                    html += `</div></div>`;
                }
            } else {
                // 單屬性顯示
                // 2倍
                if (effectiveness[2]) {
                    html += `<div class="type-group">
                        <h3>🔥 2倍效果 (超級有效)</h3>
                        <div class="effectiveness">`;
                    effectiveness[2].forEach(type => {
                        html += `<span class="type-badge double">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 1倍
                if (effectiveness[1]) {
                    html += `<div class="type-group">
                        <h3>💚 1倍效果 (正常)</h3>
                        <div class="effectiveness">`;
                    effectiveness[1].forEach(type => {
                        html += `<span class="type-badge normal">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 0.5倍
                if (effectiveness[0.5]) {
                    html += `<div class="type-group">
                        <h3>💙 0.5倍效果 (效果不佳)</h3>
                        <div class="effectiveness">`;
                    effectiveness[0.5].forEach(type => {
                        html += `<span class="type-badge half">${type}</span>`;
                    });
                    html += `</div></div>`;
                }

                // 0倍
                if (effectiveness[0]) {
                    html += `<div class="type-group">
                        <h3>⚫ 0倍效果 (無效)</h3>
                        <div class="effectiveness">`;
                    effectiveness[0].forEach(type => {
                        html += `<span class="type-badge zero">${type}</span>`;
                    });
                    html += `</div></div>`;
                }
            }

            resultDiv.innerHTML = html;
        }

        // 頁面載入時初始化
        window.onload = initSelects;

        // 重置選單
        function resetSelections() {
            document.getElementById('type1').value = '';
            document.getElementById('type2').value = '';
            document.getElementById('result').innerHTML = '';
        }
    </script>
</body>
</html>
